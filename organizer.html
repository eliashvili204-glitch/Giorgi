@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f2035;font-family:'Lato',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;}

#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;}
#loading p{font-size:13px;color:rgba(255,255,255,.5);}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#4dd9a0;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#error-screen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
#error-screen p{color:#f87171;font-size:14px;max-width:400px;line-height:1.6;}

#app{display:none;flex-direction:column;min-height:100vh;}

.top-bar{background:#122840;border-bottom:1px solid rgba(255,255,255,0.1);padding:12px 20px;display:flex;align-items:center;gap:12px;}
.top-bar-title{flex:1;font-size:13px;font-weight:700;color:#e8c96a;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4dd9a0;animation:pulse 1.5s infinite;flex-shrink:0;}
.status-dot.offline{background:#f87171;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-label{font-size:11px;color:rgba(255,255,255,.5);}
.notif-btn{background:rgba(255,255,255,.08);border:none;border-radius:20px;padding:5px 10px;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;position:relative;display:none;align-items:center;gap:4px;}
.notif-count{background:#f87171;border-radius:20px;font-size:9px;font-weight:700;padding:1px 5px;}

.layout{display:grid;grid-template-columns:1fr 300px;flex:1;min-height:0;}
@media(max-width:700px){.layout{grid-template-columns:1fr;}}

.agenda-panel{padding:20px;overflow-y:auto;max-height:calc(100vh - 54px);}
.section-title{text-align:center;padding:14px 0 8px;font-size:12px;font-weight:700;color:#e8c96a;letter-spacing:.05em;border-top:1px solid rgba(255,255,255,.12);margin-top:8px;}
.section-title:first-child{border-top:none;margin-top:0;}
.item{display:flex;gap:0;margin-bottom:3px;border-left:3px solid transparent;border-radius:0 6px 6px 0;cursor:pointer;transition:background .15s,border-color .15s;}
.item:hover:not(.break){background:rgba(255,255,255,.06);}
.item.live{border-left-color:#4dd9a0;background:rgba(29,158,117,.18);}
.item.break{cursor:default;opacity:.6;}
.t-col{min-width:84px;padding:9px 10px 9px 0;font-size:11px;font-weight:700;color:#e8c96a;flex-shrink:0;line-height:1.35;}
.divline{width:1px;background:rgba(255,255,255,.2);flex-shrink:0;margin:6px 0;}
.i-col{flex:1;padding:9px 0 9px 12px;}
.i-name{font-size:12.5px;font-weight:700;color:#fff;line-height:1.35;}
.item.live .i-name{color:#4dd9a0;}
.i-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;line-height:1.4;}
.item.live .i-sub{color:rgba(77,217,160,.75);}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;margin-left:7px;vertical-align:middle;}
.badge-live{background:#4dd9a0;color:#0a3d2a;}
.badge-next{background:rgba(255,255,255,.12);color:rgba(255,255,255,.6);}

.side-panel{background:#122840;border-left:1px solid rgba(255,255,255,.1);padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 54px);}
.now-card{background:rgba(29,158,117,.18);border:1.5px solid #4dd9a0;border-radius:10px;padding:14px;}
.now-label{font-size:10px;color:#4dd9a0;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.now-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px;line-height:1.3;}
.now-talk{font-size:11px;color:rgba(77,217,160,.8);line-height:1.4;}
.next-card{background:rgba(255,255,255,.06);border-radius:8px;padding:12px;}
.next-label{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.next-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);}
.next-talk{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.ctrl-btns{display:flex;flex-direction:column;gap:8px;}
.btn{padding:11px 16px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s;}
.btn-next{background:#4dd9a0;color:#0a3d2a;}
.btn-next:hover{background:#3dc990;}
.btn-next:active{transform:scale(.98);}
.btn-prev{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);}
.btn-prev:hover{background:rgba(255,255,255,.14);}
.audience-link{background:rgba(232,201,106,.08);border:1px solid rgba(232,201,106,.3);border-radius:8px;padding:12px;}
.audience-link p{font-size:11px;color:#e8c96a;margin-bottom:6px;font-weight:700;}
.link-box{font-size:10px;color:rgba(255,255,255,.5);background:rgba(0,0,0,.25);border-radius:5px;padding:6px 8px;word-break:break-all;cursor:pointer;border:1px solid rgba(255,255,255,.1);}
.link-box:hover{border-color:rgba(255,255,255,.3);}
.copy-hint{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;text-align:center;}
.btn-sml{padding:6px 10px;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);margin-top:5px;width:100%;}
.btn-sml:hover{background:rgba(255,255,255,.14);}
.btn-email{background:rgba(77,130,217,.18);border:1px solid rgba(77,130,217,.4);color:#7ab3f5;}
.btn-ai-toggle{background:rgba(77,217,160,.15);border:1px solid rgba(77,217,160,.4);color:#4dd9a0;font-weight:700;}
.btn-ai-toggle.off{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4);color:#f87171;}
.btn-countdown-toggle{background:rgba(232,201,106,.12);border:1px solid rgba(232,201,106,.35);color:#e8c96a;font-weight:700;}
.btn-countdown-toggle.off{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.4);}
.btn-email:hover{background:rgba(77,130,217,.28);}
.ctrl-toggles{display:flex;flex-direction:column;gap:8px;}
.timer-box{background:rgba(0,0,0,.25);border-radius:8px;padding:10px 12px;text-align:center;}
.timer-label{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.timer-val{font-size:26px;font-weight:700;color:#e8c96a;letter-spacing:.04em;font-variant-numeric:tabular-nums;}
.timer-val.warn{color:#f87171;}

/* ── INBOX PANEL ── */
.inbox-section{border-top:1px solid rgba(255,255,255,.1);padding-top:14px;flex-shrink:0;}
.inbox-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.inbox-tabs{display:flex;gap:6px;margin-bottom:10px;}
.inbox-tab{flex:1;padding:5px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:none;color:rgba(255,255,255,.4);font-size:10px;font-weight:700;cursor:pointer;text-align:center;}
.inbox-tab.active{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.25);}
.inbox-list{display:flex;flex-direction:column;gap:6px;}
.inbox-empty{font-size:11px;color:rgba(255,255,255,.25);text-align:center;padding:16px;}

/* Chat threads */
.chat-thread{background:rgba(255,255,255,.05);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.06);}
.chat-thread.has-new{border-color:rgba(77,217,160,.35);}
.chat-thread-header{padding:8px 10px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px;}
.chat-thread-header:hover{background:rgba(255,255,255,.08);}
.chat-thread-meta{flex:1;min-width:0;}
.chat-thread-label{font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;}
.chat-thread-num{font-size:10px;font-weight:700;color:#e8c96a;}
.chat-thread-preview{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-thread-badges{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.unread-badge{background:#f87171;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;}
.chevron{font-size:10px;color:rgba(255,255,255,.3);transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.chat-thread-msgs{padding:8px 10px;display:none;flex-direction:column;gap:6px;border-top:1px solid rgba(255,255,255,.07);max-height:280px;overflow-y:auto;}
.chat-thread-msgs.open{display:flex;}
.thread-msg{font-size:11px;line-height:1.45;padding:5px 8px;border-radius:6px;}
.thread-msg.p{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);}
.thread-msg.p::before{content:"Participant: ";color:rgba(255,255,255,.35);font-size:10px;}
.thread-msg.o{background:rgba(77,217,160,.12);color:#4dd9a0;}
.thread-msg.o::before{content:"Organizer";color:rgba(77,217,160,.6);font-size:10px;display:block;font-weight:700;margin-bottom:2px;}
.thread-msg.a{background:rgba(122,179,245,.1);color:#7ab3f5;border-left:2px solid rgba(122,179,245,.35);}
.thread-msg.a::before{content:"AI";color:rgba(122,179,245,.6);font-size:10px;display:block;font-weight:700;margin-bottom:2px;}
.reply-row{display:flex;gap:6px;margin-top:6px;}
.reply-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:6px 8px;font-size:11px;color:#fff;font-family:'Lato',sans-serif;outline:none;}
.reply-inp::placeholder{color:rgba(255,255,255,.25);}
.reply-inp:focus{border-color:rgba(77,217,160,.4);}
.reply-btn{background:#4dd9a0;border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;color:#0a3d2a;cursor:pointer;}

/* Feedback */

.fb-item-text{font-size:11px;color:rgba(255,255,255,.8);line-height:1.6;font-weight:300;}
.fb-item-time{font-size:9px;color:rgba(255,255,255,.2);margin-top:5px;letter-spacing:.03em;}
.fb-download-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:12px;padding:9px 14px;background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.35);border-radius:8px;color:#e8c96a;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:background .2s,border-color .2s,transform .1s;font-family:'Lato',sans-serif;}
.fb-download-btn:hover{background:linear-gradient(135deg,rgba(201,168,76,.28),rgba(201,168,76,.14));border-color:rgba(201,168,76,.6);}
.fb-download-btn:active{transform:scale(.97);}
.fb-download-btn svg{flex-shrink:0;}

    const { data, error } = await sb.from('live_state').select('current_id').eq('id', 1).single();
    if (error) throw error;
    currentId = data.current_id;

    // Load existing messages from DB
    const { data: existingMsgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
    if (existingMsgs) {
      existingMsgs.forEach(m => {
        const sid = m.session_id;
        if (!threads[sid]) {
          threadCounter++;
          threads[sid] = { num: threadCounter, msgs: [] };
          threadOrder.push(sid);
        }
        const sType = m.sender === 'participant' ? 'p' : m.sender === 'ai' ? 'a' : 'o';
        threads[sid].msgs.push({ sender: sType, text: m.text, id: m.id, read: true });
      });
    }

    // Load existing feedback from DB
    const { data: existingFb } = await sb.from('feedback').select('*').order('created_at', { ascending: false });
    if (existingFb) feedbacks = existingFb;

    startApp();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    console.error(e);
  }
});

function startApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Live state realtime
  channel = sb.channel('live_state_changes')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'live_state' }, payload => {
      currentId = payload.new.current_id;
      render();
      // Sync AI state if changed externally
      if (payload.new.ai_enabled !== undefined && payload.new.ai_enabled !== aiEnabled) {
        aiEnabled = payload.new.ai_enabled;
        const btn = document.getElementById('ai-toggle-btn');
        if (btn) {
          btn.textContent = aiEnabled ? '🤖 AI: ON' : '🤖 AI: OFF';
          btn.classList.toggle('off', !aiEnabled);
        }
      }
      // Sync countdown state if changed externally
      if (payload.new.show_countdown !== undefined) {
        showCountdown = Boolean(payload.new.show_countdown);
        const btn2 = document.getElementById('countdown-toggle-btn');
        if (btn2) {
          btn2.textContent = showCountdown ? '⏳ Countdown: ON' : '⏳ Countdown: OFF';
          btn2.classList.toggle('off', !showCountdown);
        }
      }
    })
    .subscribe(status => {
      const dot = document.getElementById('status-dot');
      const lbl = document.getElementById('status-label');
      if (status === 'SUBSCRIBED') {
        dot.classList.remove('offline');
        lbl.textContent = 'Real-time active';
      } else {
        dot.classList.add('offline');
        lbl.textContent = 'Connecting...';
      }
    });

  // ALL incoming messages (participant + ai + organizer)
  sb.channel('incoming_messages')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload => {
      const sid = payload.new.session_id;
      const rawSender = payload.new.sender; // 'participant' | 'ai' | 'organizer'
      const sType = rawSender === 'participant' ? 'p' : rawSender === 'ai' ? 'a' : 'o';
      const isNew = !threads[sid];

      if (isNew) {
        threadCounter++;
        threads[sid] = { num: threadCounter, msgs: [] };
        threadOrder.push(sid);
      }

      // Skip duplicate if organizer just sent this (already in DOM)
      if (sType === 'o') {
        const already = threads[sid].msgs.some(m => m.sender === 'o' && m.text === payload.new.text && !m.id);
        if (already) {
          // Just stamp the id so future checks work
          const m = threads[sid].msgs.find(m => m.sender === 'o' && m.text === payload.new.text && !m.id);
          if (m) m.id = payload.new.id;
          return;
        }
      }

      const isUnread = sType === 'p';
      const msgObj = { sender: sType, text: payload.new.text, id: payload.new.id, read: !isUnread };
      threads[sid].msgs.push(msgObj);

      const msgsEl = document.getElementById('msgs-' + sid);
      const isOpen = msgsEl && msgsEl.classList.contains('open');

      if (isNew) {
        // New thread needs full render
        renderChatList();
        return;
      }

      // Update DOM directly
      if (isOpen) {
        if (isUnread) msgObj.read = true;
        const replyRow = msgsEl.querySelector('.reply-row');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'thread-msg ' + sType;
        msgDiv.textContent = payload.new.text;
        msgsEl.insertBefore(msgDiv, replyRow);
        msgsEl.scrollTop = msgsEl.scrollHeight;
      } else if (sType === 'p' || sType === 'a') {
        // Badge for participant messages; AI messages just highlight thread so organizer sees the reply
        const threadEl = document.getElementById('thread-' + sid);
        if (threadEl) {
          if (sType === 'p') {
            threadEl.classList.add('has-new');
            let badge = threadEl.querySelector('.unread-badge');
            const unreadCount = threads[sid].msgs.filter(m => m.sender === 'p' && !m.read).length;
            if (!badge) {
              badge = document.createElement('span');
              badge.className = 'unread-badge';
              threadEl.querySelector('.chat-thread-badges').prepend(badge);
            }
            badge.textContent = unreadCount + ' new';
          }
          // For AI messages: update header preview so organizer sees the AI reply without opening thread
        }
      }

      // Update preview text for all types (participant, ai, organizer)
      const preview = document.querySelector('#thread-' + sid + ' .chat-thread-preview');
      const t = payload.new.text;
      if (preview) preview.textContent = t.length > 35 ? t.substr(0, 35) + '…' : t;

      if (isUnread) { newMsgCount++; updateNotifBadge(); }
    })
    .subscribe();

  // Incoming feedback
  sb.channel('incoming_feedback')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'feedback' }, payload => {
      feedbacks.unshift(payload.new);
      renderFbList();
    })
    .subscribe();

  render();
  renderChatList();
  renderFbList();
  startTimer();
  loadAIState();
  loadCountdownState();
}

function updateNotifBadge() {
  const btn = document.getElementById('notif-btn');
  const cnt = document.getElementById('notif-count');
  // Count truly unread participant messages
  let unread = 0;
  Object.values(threads).forEach(t => {
    t.msgs.forEach(m => { if (m.sender === 'p' && !m.read) unread++; });
  });
  newMsgCount = unread;
  if (unread > 0) {
    btn.style.display = 'flex';
    cnt.textContent = unread;
  } else {
    btn.style.display = 'none';
  }
}

function switchTab(tab) {

  document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
  document.getElementById('tab-fb').classList.toggle('active', tab === 'fb');

  document.getElementById('fb-list').style.display = tab === 'fb' ? 'flex' : 'none';

function renderChatList() {
  const list = document.getElementById('chat-list');
  if (!threadOrder.length) {
    list.innerHTML = '<div class="inbox-empty">No questions yet</div>';
    return;
  }
  // Remember which threads are open
  const openSet = new Set();
  threadOrder.forEach(sid => {
    const el = document.getElementById('msgs-' + sid);
    if (el && el.classList.contains('open')) openSet.add(sid);
  });

  list.innerHTML = '';
  // Sort by thread number (stable order, no jumping around)
  const sorted = [...threadOrder].sort((a, b) => threads[a].num - threads[b].num);

  sorted.forEach(sid => {
    const t = threads[sid];
    const msgs = t.msgs;
    const lastMsg = msgs[msgs.length - 1];
    const unreadCount = msgs.filter(m => m.sender === 'p' && !m.read).length;
    const preview = lastMsg ? (lastMsg.text.length > 35 ? lastMsg.text.substr(0,35)+'…' : lastMsg.text) : '';
    const isOpen = openSet.has(sid);

    const div = document.createElement('div');
    div.className = 'chat-thread' + (unreadCount > 0 ? ' has-new' : '');
    div.id = 'thread-' + sid;

    div.innerHTML = `
      <div class="chat-thread-header" onclick="toggleThread('${sid}')">
        <div class="chat-thread-meta">
          <div class="chat-thread-label">
            <span class="chat-thread-num">Chat ${t.num}</span>
          </div>
          <div class="chat-thread-preview">${preview}</div>
        </div>
        <div class="chat-thread-badges">
          ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount} new</span>` : ''}
          <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
        </div>
      </div>
      <div class="chat-thread-msgs ${isOpen ? 'open' : ''}" id="msgs-${sid}">
        ${msgs.map(m => `<div class="thread-msg ${m.sender}">${m.text}</div>`).join('')}
        <div class="reply-row">
          <input class="reply-inp" id="reply-${sid}" placeholder="Reply to Chat ${t.num}..." onkeydown="if(event.key==='Enter')sendReply('${sid}')">
          <button class="reply-btn" onclick="sendReply('${sid}')">↑</button>
        </div>
      </div>`;
    list.appendChild(div);

    // If it was open, mark messages as read
    if (isOpen) {
      threads[sid].msgs.forEach(m => m.read = true);
      setTimeout(() => {
        const msgsEl2 = document.getElementById('msgs-' + sid);
        if (msgsEl2) msgsEl2.scrollTop = msgsEl2.scrollHeight;
      }, 50);
    }
  });
  updateNotifBadge();
}

function toggleThread(sid) {
  const msgsEl = document.getElementById('msgs-' + sid);
  if (!msgsEl) return;
  const chevron = document.querySelector('#thread-' + sid + ' .chevron');
  const isOpen = msgsEl.classList.contains('open');

  if (isOpen) {
    // Close
    msgsEl.classList.remove('open');
    if (chevron) chevron.classList.remove('open');
  } else {
    // Open — re-render messages from state so nothing is missed
    const replyRow = msgsEl.querySelector('.reply-row');
    Array.from(msgsEl.querySelectorAll('.thread-msg')).forEach(el => el.remove());
    threads[sid].msgs.forEach(m => {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'thread-msg ' + m.sender;
      msgDiv.textContent = m.text;
      msgsEl.insertBefore(msgDiv, replyRow);
    });

    msgsEl.classList.add('open');
    if (chevron) chevron.classList.add('open');
    threads[sid].msgs.forEach(m => m.read = true);
    updateNotifBadge();
    const threadEl = document.getElementById('thread-' + sid);
    if (threadEl) {
      threadEl.classList.remove('has-new');
      const badge = threadEl.querySelector('.unread-badge');
      if (badge) badge.remove();
    }
    setTimeout(() => { msgsEl.scrollTop = msgsEl.scrollHeight; }, 30);
  }
}

async function sendReply(sid) {
  const inp = document.getElementById('reply-' + sid);
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const msgObj = { sender:'o', text, read: true };
  threads[sid].msgs.push(msgObj);

  // Auto-disable AI when organizer manually replies
  if (aiEnabled) {
    aiEnabled = false;
    const btn = document.getElementById('ai-toggle-btn');
    if (btn) { btn.textContent = '🤖 AI: OFF'; btn.classList.add('off'); }
    try {
      const { error } = await sb.from('live_state').update({ ai_enabled: false }).eq('id', 1);
      if (error) await sb.from('live_state').upsert({ id: 1, ai_enabled: false });
    } catch(e) { console.error('AI auto-off failed:', e); }
  }

  await sb.from('messages').insert({ session_id: sid, sender: 'organizer', text });

  // Add message to DOM directly without full re-render
  const msgsEl = document.getElementById('msgs-' + sid);
  if (msgsEl) {
    const replyRow = msgsEl.querySelector('.reply-row');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'thread-msg o';
    msgDiv.textContent = text;
    msgsEl.insertBefore(msgDiv, replyRow);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  // Update preview text
  const threadEl = document.getElementById('thread-' + sid);
  if (threadEl) {
    const preview = threadEl.querySelector('.chat-thread-preview');
    if (preview) preview.textContent = text.length > 35 ? text.substr(0,35)+'…' : text;
  }
}

function renderFbList() {
  const list = document.getElementById('fb-list');
  const dlBtn = document.getElementById('fb-download-btn');
  if (!feedbacks.length) { list.innerHTML = '<div class="inbox-empty">No feedback yet</div>'; if(dlBtn) dlBtn.style.display='none'; return; }

}

function getNextPresenter(fromId) {
  const ci = AGENDA.findIndex(a => a.id === fromId);
  for (let i = ci + 1; i < AGENDA.length; i++) {
    if (!AGENDA[i].isBreak) return AGENDA[i];
  }
  return null;
}
function getPrevPresenter(fromId) {
  const ci = AGENDA.findIndex(a => a.id === fromId);
  for (let i = ci - 1; i >= 0; i--) {
    if (!AGENDA[i].isBreak) return AGENDA[i];
  }
  return null;
}

function render() {
  const cur = AGENDA.find(a => a.id === currentId);
  const nxt = getNextPresenter(currentId);

  document.getElementById('side-now-name').textContent = cur ? cur.speaker : '—';
  document.getElementById('side-now-talk').textContent = cur ? (cur.title.split('\n')[0] || '') : '';
  document.getElementById('side-next-name').textContent = nxt ? nxt.speaker : 'Program Concluded';
  document.getElementById('side-next-talk').textContent = nxt ? (nxt.title.split('\n')[0] || '') : '';

  const SECTIONS = [
    { key:'pre',      label:'' },
    { key:'opening',  label:'Opening Session (10:00–11:00)' },
    { key:'students', label:"Students' Session (11:00–13:00)" },
    { key:'break',    label:'' },
    { key:'phd',      label:'PhD Session (14:00–17:00)\nChairman: Giorgi Aladashvili, MD · Ana Pruidze' },
    { key:'closing',  label:'' },
  ];
  let html = '';
  SECTIONS.forEach(sec => {
    const items = AGENDA.filter(a => a.session === sec.key);
    if (!items.length) return;
    if (sec.label) {
      const lines = sec.label.split('\n');
      html += `<div class="section-title">${lines[0]}${lines[1] ? `<br><span style="font-size:10px;font-weight:400;color:rgba(255,255,255,.4)">${lines[1]}</span>` : ''}</div>`;
    }
    items.forEach(item => {
      const isCur = item.id === currentId;
      const isNxt = nxt && item.id === nxt.id;
      const subs = item.title ? item.title.split('\n') : [];
      html += `<div class="item ${isCur?'live':''} ${item.isBreak?'break':''}" onclick="${!item.isBreak?'setLive('+item.id+')':''}">
        <div class="t-col">${item.time||''}</div>
        <div class="divline"></div>
        <div class="i-col">
          <div class="i-name">${item.speaker}
            ${isCur?'<span class="badge badge-live">● LIVE</span><span class="badge badge-live" id="agenda-timer" style="background:rgba(29,158,117,.3);color:#4dd9a0;min-width:44px;text-align:center">00:00</span>':''}
            ${isNxt?'<span class="badge badge-next">▶ Next</span>':''}
          </div>
          ${subs[0]?`<div class="i-sub"><b style="color:rgba(255,255,255,${isCur?'.85':'.65'})">${subs[0]}</b></div>`:''}
          ${subs[1]?`<div class="i-sub">${subs[1]}</div>`:''}
        </div>
      </div>`;
    });
  });
  document.getElementById('agenda-panel').innerHTML = html;

  setTimeout(() => {
    const live = document.querySelector('.item.live');
    if (live) live.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 100);
}

function startTimer() {
  timerStart = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    const val = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    const el = document.getElementById('timer-val');
    el.textContent = val;
    el.className = 'timer-val' + (elapsed >= 900 ? ' warn' : '');
    const agendaEl = document.getElementById('agenda-timer');
    if (agendaEl) { agendaEl.textContent = val; agendaEl.style.color = elapsed >= 900 ? '#f87171' : '#4dd9a0'; }
  }, 1000);
}

async function downloadFeedbackPDF() {
  if (!feedbacks.length) return;
  const { jsPDF } = window.jspdf;

  // ════════════════════════════════════════════════
  //  CONSTANTS  — 300 DPI for crisp, print-quality output
  // ════════════════════════════════════════════════
  const DPI   = 300;
  const MM    = DPI / 25.4;   // px per mm ≈ 11.811
  const W_MM  = 210;
  const H_MM  = 297;
  const MG    = 14;           // page margin mm

  function px(mm) { return Math.round(mm * MM); }

  // ── Palette — exact match to organizer dashboard
  const BG        = '#0f2035';   // dashboard body background
  const SURFACE   = '#122840';   // dashboard top-bar / side-panel
  const CARD_BG   = '#0d1e2e';   // slightly deeper card bg
  const CARD_BD   = '#1a3a55';   // card border — visible but subtle
  const GOLD      = '#e8c96a';   // dashboard gold (#e8c96a)
  const GOLD_DIM  = '#b89a3e';   // dimmed gold for secondary labels
  const CREAM     = '#f0ece2';   // main text — bright warm white
  const MUTED     = '#6b8faa';   // muted blue-grey for meta
  const HAIRLINE  = '#1e3a52';   // separator lines
  const TEAL      = '#4dd9a0';   // dashboard teal — brand accent
  const TEAL_DIM  = '#2a8f65';   // darker teal for subtle accents

  // ── Font stack: Noto Sans Georgian covers Georgian script perfectly
  function f(weight, sizeMM) {
    return `${weight} ${px(sizeMM)}px "Noto Sans Georgian", "Noto Sans", "DejaVu Sans", "Segoe UI", Arial, sans-serif`;
  }

  // ── Rounded rect path helper
  function rr(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y,     x + w, y + r,     r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x,     y + h, x,       y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x,     y,     x + r,   y,         r);
    ctx.closePath();
  }

  // ── Word-wrap — handles Georgian (no spaces = single token) correctly
  function wrapText(ctx, text, maxW) {
    if (!text || !text.trim()) return [''];
    // Split on spaces; Georgian words stay intact
    const words = text.split(/\s+/).filter(Boolean);
    const lines = [];
    let line = '';
    for (const w of words) {
      const test = line ? line + ' ' + w : w;
      if (line && ctx.measureText(test).width > maxW) {
        lines.push(line);
        line = w;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines.length ? lines : [''];
  }

  // ════════════════════════════════════════════════
  //  FONT LOADING — Noto Sans Georgian for Georgian script support
  // ════════════════════════════════════════════════
  async function loadFonts() {
    // Noto Sans Georgian — full Georgian Unicode coverage
    const defs = [
      {
        family: 'Noto Sans Georgian',
        weight: '400',
        url: 'https://fonts.gstatic.com/s/notosansgeorgian/v28/PlIaFke5O6RzLfvNNVSitxkr76PRHBC4Ytycd9pj9NBhMp1dHoVEHBJNHSzk.woff2'
      },
      {
        family: 'Noto Sans Georgian',
        weight: '700',
        url: 'https://fonts.gstatic.com/s/notosansgeorgian/v28/PlIaFke5O6RzLfvNNVSitxkr76PRHBC4Ytycd9pj9NBhMp1dHoVEHBJNHSzk.woff2'
      },
    ];
    await Promise.all(defs.map(async d => {
      try {
        const ff = new FontFace(d.family, `url(${d.url})`, { weight: d.weight, display: 'swap' });
        document.fonts.add(await ff.load());
      } catch (_) {}
    }));
    await document.fonts.ready;
  }

  // ════════════════════════════════════════════════
  //  CARD MEASUREMENT
  // ════════════════════════════════════════════════
  const TEXT_SIZE_MM = 3.6;
  const LINE_H_MM    = 5.6;
  const PAD_TOP_MM   = 6.5;
  const PAD_BOT_MM   = 6.5;
  const META_H_MM    = 5.5;
  const INNER_MG_MM  = 6.5;
  const ACCENT_W_MM  = 1.8;

  function cardHeight(measCtx, fb) {
    const maxW = px(W_MM - MG * 2 - ACCENT_W_MM - INNER_MG_MM - 4);
    measCtx.font = f('400', TEXT_SIZE_MM);
    const lines = wrapText(measCtx, fb.text || '', maxW);
    return PAD_TOP_MM + META_H_MM + lines.length * LINE_H_MM + PAD_BOT_MM;
  }

  // ════════════════════════════════════════════════
  //  PAGE RENDERER
  // ════════════════════════════════════════════════
  function renderPage(items, isFirst, pageNum, totalPages, genDate) {
    const cW = px(W_MM);
    const cH = px(H_MM);
    const mg = px(MG);

    const cv = document.createElement('canvas');
    cv.width = cW; cv.height = cH;
    const ctx = cv.getContext('2d');
    ctx.textBaseline = 'alphabetic';

    // ── Full background
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, cW, cH);

    if (isFirst) {
      // ── HEADER ZONE  (0 – 48mm)
      const HH = px(48);

      // Header surface
      ctx.fillStyle = SURFACE;
      ctx.fillRect(0, 0, cW, HH);

      // Left teal accent bar
      const accentGrad = ctx.createLinearGradient(0, 0, 0, HH);
      accentGrad.addColorStop(0, TEAL);
      accentGrad.addColorStop(1, TEAL_DIM);
      ctx.fillStyle = accentGrad;
      ctx.fillRect(0, 0, px(1.5), HH);

      // Gold bottom rule
      ctx.strokeStyle = GOLD;
      ctx.lineWidth = px(0.4);
      ctx.beginPath(); ctx.moveTo(0, HH); ctx.lineTo(cW, HH); ctx.stroke();

      // Subtle gold inner rule just above bottom
      ctx.strokeStyle = GOLD + '33';
      ctx.lineWidth = px(0.2);
      ctx.beginPath(); ctx.moveTo(0, HH - px(0.6)); ctx.lineTo(cW, HH - px(0.6)); ctx.stroke();

      // "S Y S S A" wordmark — spaced, teal
      ctx.fillStyle = TEAL;
      ctx.font = f('700', 2.6);
      ctx.letterSpacing = px(3.5) + 'px';
      ctx.fillText('S Y S S A', mg + px(0.5), px(11.5));
      ctx.letterSpacing = '0px';

      // thin gold underline rule after wordmark
      ctx.strokeStyle = GOLD_DIM;
      ctx.lineWidth = px(0.25);
      ctx.beginPath(); ctx.moveTo(mg, px(14)); ctx.lineTo(mg + px(32), px(14)); ctx.stroke();

      // Main title — large, cream
      ctx.fillStyle = CREAM;
      ctx.font = f('700', 7.0);
      ctx.fillText("Nobel's Day — Feedback Report", mg, px(26));

      // Subtitle
      ctx.fillStyle = MUTED;
      ctx.font = f('400', 2.9);
      ctx.fillText('SYSSA XIII Scientific Session  ·  DTMU / Caucasus Medical Centre', mg, px(34));

      // ── Right column
      ctx.textAlign = 'right';

      // Response count pill
      const countText = `${feedbacks.length} responses`;
      ctx.font = f('700', 3.0);
      const ctW = ctx.measureText(countText).width + px(5);
      const ctX = cW - mg - ctW;
      const ctY = px(15);
      const ctHt = px(5.5);
      rr(ctx, ctX, ctY, ctW, ctHt, px(1.8));
      ctx.fillStyle = GOLD + '25';
      ctx.fill();
      ctx.strokeStyle = GOLD + '60';
      ctx.lineWidth = px(0.25);
      ctx.stroke();
      ctx.fillStyle = GOLD;
      ctx.fillText(countText, cW - mg - px(2.5), ctY + px(4));

      // Date / time
      ctx.fillStyle = MUTED;
      ctx.font = f('400', 2.6);
      ctx.fillText(genDate, cW - mg, px(29));
      ctx.textAlign = 'left';

    } else {
      // ── CONTINUATION HEADER  (0 – 13mm)
      const HH = px(13);
      ctx.fillStyle = SURFACE;
      ctx.fillRect(0, 0, cW, HH);
      ctx.fillStyle = TEAL;
      ctx.fillRect(0, 0, px(1.5), HH);
      ctx.strokeStyle = GOLD;
      ctx.lineWidth = px(0.35);
      ctx.beginPath(); ctx.moveTo(0, HH); ctx.lineTo(cW, HH); ctx.stroke();

      ctx.fillStyle = MUTED;
      ctx.font = f('400', 2.5);
      ctx.fillText("SYSSA — Nobel's Day Feedback Report", mg, px(8.5));

      ctx.fillStyle = GOLD_DIM;
      ctx.font = f('700', 2.5);
      ctx.textAlign = 'right';
      ctx.fillText(`Page ${pageNum} / ${totalPages}`, cW - mg, px(8.5));
      ctx.textAlign = 'left';
    }

    // ── FOOTER  (283 – 297mm)
    const FY = px(282);
    ctx.fillStyle = SURFACE;
    ctx.fillRect(0, FY, cW, cH - FY);

    // Footer top rule — gold
    ctx.strokeStyle = GOLD + '55';
    ctx.lineWidth = px(0.3);
    ctx.beginPath(); ctx.moveTo(0, FY); ctx.lineTo(cW, FY); ctx.stroke();

    // Footer inner separator
    ctx.strokeStyle = HAIRLINE;
    ctx.lineWidth = px(0.2);
    ctx.beginPath(); ctx.moveTo(mg, FY + px(0.5)); ctx.lineTo(cW - mg, FY + px(0.5)); ctx.stroke();

    ctx.fillStyle = MUTED;
    ctx.font = f('400', 2.4);
    ctx.fillText("SYSSA Nobel's Day  ·  Confidential Organizer Report", mg, px(290.5));

    ctx.fillStyle = GOLD;
    ctx.font = f('700', 2.4);
    ctx.textAlign = 'right';
    ctx.fillText('syssa.ge', cW - mg, px(290.5));
    ctx.textAlign = 'left';

    ctx.fillStyle = TEAL + '88';
    ctx.font = f('700', 2.4);
    ctx.textAlign = 'center';
    ctx.fillText(`${pageNum} / ${totalPages}`, cW / 2, px(290.5));
    ctx.textAlign = 'left';

    // ════════════════════════════════════════════════
    //  CARDS
    // ════════════════════════════════════════════════
    const maxInnerW = px(W_MM - MG * 2 - ACCENT_W_MM - INNER_MG_MM - 4);
    const ACCENT_W  = px(ACCENT_W_MM);

    items.forEach(({ fb, num, yMM }) => {
      const fbText = (fb.text || '').trim();
      const fbTime = fb.created_at
        ? new Date(fb.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
        : '';

      ctx.font = f('400', TEXT_SIZE_MM);
      const lines = wrapText(ctx, fbText, maxInnerW);
      const cH_mm = PAD_TOP_MM + META_H_MM + lines.length * LINE_H_MM + PAD_BOT_MM;

      const cX   = mg;
      const cY   = px(yMM);
      const cW2  = px(W_MM - MG * 2);
      const cHpx = px(cH_mm);
      const R    = px(2.8);

      // ── Card shadow (subtle depth)
      ctx.save();
      ctx.shadowColor    = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur     = px(3.5);
      ctx.shadowOffsetY  = px(1.0);
      ctx.fillStyle      = CARD_BG;
      rr(ctx, cX, cY, cW2, cHpx, R);
      ctx.fill();
      ctx.restore();

      // ── Card border
      ctx.strokeStyle = CARD_BD;
      ctx.lineWidth   = px(0.25);
      rr(ctx, cX, cY, cW2, cHpx, R);
      ctx.stroke();

      // ── Gold accent bar — left edge, gradient for richness
      ctx.save();
      rr(ctx, cX, cY, cW2, cHpx, R);
      ctx.clip();
      const barGrad = ctx.createLinearGradient(0, cY, 0, cY + cHpx);
      barGrad.addColorStop(0, GOLD);
      barGrad.addColorStop(1, GOLD_DIM);
      ctx.fillStyle = barGrad;
      ctx.fillRect(cX, cY, ACCENT_W, cHpx);
      ctx.restore();

      // ── Content X positions
      const IX  = cX + ACCENT_W + px(INNER_MG_MM - 1.2);  // text left edge
      const IXR = cX + cW2 - px(4);                        // right edge for text

      // Label row baseline — sits within top padding
      const labelBaseline = cY + px(PAD_TOP_MM * 0.7) + px(3.2);

      // "#N" — bold gold
      ctx.fillStyle = GOLD;
      ctx.font = f('700', 3.2);
      ctx.letterSpacing = px(0.4) + 'px';
      ctx.fillText(`#${num}`, IX, labelBaseline);
      ctx.letterSpacing = '0px';

      // "FEEDBACK" label — lighter, spaced caps
      const numTextW = ctx.measureText(`#${num}`).width + px(2.2);
      ctx.fillStyle = GOLD_DIM;
      ctx.font = f('700', 2.4);
      ctx.letterSpacing = px(0.9) + 'px';
      ctx.fillText('FEEDBACK', IX + numTextW, labelBaseline - px(0.4));
      ctx.letterSpacing = '0px';

      // Timestamp — right-aligned, muted
      if (fbTime) {
        ctx.fillStyle = MUTED;
        ctx.font = f('400', 2.5);
        ctx.textAlign = 'right';
        ctx.fillText(fbTime, IXR, labelBaseline);
        ctx.textAlign = 'left';
      }

      // ── Hairline separator
      const sepY = cY + px(PAD_TOP_MM + META_H_MM);
      ctx.strokeStyle = HAIRLINE;
      ctx.lineWidth   = px(0.22);
      ctx.beginPath();
      ctx.moveTo(IX, sepY);
      ctx.lineTo(IXR + px(2), sepY);
      ctx.stroke();

      // ── Body text — warm cream, left-aligned, proper line height
      ctx.fillStyle = CREAM;
      ctx.font = f('400', TEXT_SIZE_MM);
      const textStartY = sepY + px(LINE_H_MM * 0.85);
      lines.forEach((ln, li) => {
        ctx.fillText(ln, IX, textStartY + li * px(LINE_H_MM));
      });
    });

    // PNG — lossless
    return cv.toDataURL('image/png');
  }

  // ════════════════════════════════════════════════
  //  MAIN
  // ════════════════════════════════════════════════
  await loadFonts();

  const now = new Date();
  const genDate =
    now.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' }) +
    '  ' +
    now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

  // ── Measurement canvas for pagination
  const measCv = document.createElement('canvas');
  measCv.width = px(W_MM); measCv.height = 10;
  const measCtx = measCv.getContext('2d');

  const FIRST_BODY_MM = 54;    // first page: after header
  const CONT_BODY_MM  = 19;    // continuation pages
  const FOOTER_LIM_MM = 278;   // stop before footer
  const GAP_MM        = 4.0;   // gap between cards

  const pages = [[]];
  let curPage = 0;
  let yMM = FIRST_BODY_MM;

  feedbacks.forEach((fb, i) => {
    const num = feedbacks.length - i;
    const h   = cardHeight(measCtx, fb);
    if (yMM + h > FOOTER_LIM_MM) {
      pages.push([]);
      curPage++;
      yMM = CONT_BODY_MM;
    }
    pages[curPage].push({ fb, num, yMM });
    yMM += h + GAP_MM;
  });

  const totalPages = pages.length;

  // ── Build PDF
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  pages.forEach((items, pi) => {
    if (pi > 0) doc.addPage();
    const img = renderPage(items, pi === 0, pi + 1, totalPages, genDate);
    doc.addImage(img, 'PNG', 0, 0, W_MM, H_MM);
  });

  doc.save(`SYSSA_Feedback_${now.toISOString().slice(0, 10)}.pdf`);
}
</script>
</body>
</html>
