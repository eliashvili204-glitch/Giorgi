<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Serif+Display&display=swap');
:root{
  --bg:#EAEFF2;--bg2:#D5E1EA;--surface:#FFFFFF;--border:#B2C4D1;
  --text:#0A1B29;--text-dim:#33475B;--text-faint:#607386;--text-soft:#33475B;
  --gold:#1A365D;--gold-soft:#E6EDF5;--gold-border:#94A9C2;
  --navy:#1A365D;--navy-soft:#E6EDF5;--navy-border:#94A9C2;
  --live:#16A34A;--warn:#DC2626;
  --teal:#16A34A;--teal-soft:rgba(22,163,74,.1);--teal-border:rgba(22,163,74,.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;}
#loading p{font-size:12px;color:var(--text-faint);letter-spacing:.06em;text-transform:uppercase;}
.spinner{width:28px;height:28px;border:1.5px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#error-screen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
#error-screen p{color:var(--warn);font-size:13px;max-width:360px;line-height:1.7;}
#app{display:none;flex-direction:column;min-height:100vh;}

/* ── TOP BAR ── */
.top-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logos{display:flex;align-items:center;gap:10px;}
.logo-circle{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--text-dim);background:transparent;text-align:center;line-height:1.2;flex-shrink:0;letter-spacing:.02em;}
.logo-sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.syssa-logo{background:none;border:1px solid var(--border);border-radius:3px;padding:2px 7px;font-size:8px;font-weight:700;letter-spacing:.12em;color:var(--text);}
.bar-title{font-family:'DM Serif Display',serif;font-size:14px;color:var(--navy);flex:1;white-space:nowrap;}
.status-row{display:flex;align-items:center;gap:8px;margin-left:auto;}
.f-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 2s infinite;flex-shrink:0;}
.f-dot.off{background:var(--warn);animation:none;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.status-label{font-size:11px;color:var(--text-faint);}
.notif-btn{background:var(--warn);border:none;border-radius:20px;padding:4px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;display:none;align-items:center;gap:5px;}
.badge-count{font-size:9px;font-weight:700;}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:1fr 300px;flex:1;min-height:0;}
@media(max-width:800px){.layout{grid-template-columns:1fr;}}

/* ── AGENDA PANEL ── */
.agenda-panel{padding:20px;overflow-y:auto;max-height:calc(100vh - 54px);}
.section-title{text-align:left;padding:14px 0 8px;font-size:10px;font-weight:700;color:var(--navy);letter-spacing:.1em;text-transform:uppercase;border-top:1px solid var(--border);margin-top:12px;display:flex;flex-direction:column;gap:2px;}
.section-title:first-child{border-top:none;margin-top:0;}
.section-sub{font-size:10px;font-weight:400;color:var(--text-faint);text-transform:none;letter-spacing:.02em;}
.item{display:flex;gap:0;margin-bottom:2px;border-left:2px solid transparent;border-radius:0 8px 8px 0;cursor:pointer;transition:background .15s,border-color .15s;padding:2px 0;}
.item:hover:not(.break){background:rgba(26,54,93,.06);}
.item.live{border-left-color:var(--live);background:rgba(22,163,74,.08);}
.item.break{cursor:default;opacity:.55;}
.t-col{min-width:80px;padding:10px 10px 10px 0;font-size:11px;font-weight:700;color:var(--navy);flex-shrink:0;line-height:1.3;}
.divline{width:1px;background:var(--border);flex-shrink:0;margin:6px 0;}
.i-col{flex:1;padding:10px 0 10px 12px;}
.i-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;display:flex;align-items:center;flex-wrap:wrap;gap:6px;}
.item.live .i-name span:first-child{color:var(--live);}
.i-sub{font-size:11px;color:var(--text-dim);margin-top:3px;line-height:1.4;}
.i-sub2{font-size:10px;color:var(--text-faint);margin-top:2px;font-style:italic;}
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;white-space:nowrap;}
.badge-live{background:var(--live);color:#fff;}
.badge-next{background:var(--bg2);color:var(--text-dim);border:1px solid var(--border);}
.badge-timer{background:rgba(22,163,74,.12);color:var(--live);border:1px solid rgba(22,163,74,.3);min-width:44px;text-align:center;font-variant-numeric:tabular-nums;}

/* ── SIDE PANEL ── */
.side-panel{background:var(--surface);border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 54px);}

.now-card{background:linear-gradient(160deg,rgba(22,163,74,.08),var(--surface));border:1px solid var(--teal-border);border-radius:12px;padding:16px;}
.now-top{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 2s infinite;}
.live-tag{font-size:9px;font-weight:700;color:var(--live);text-transform:uppercase;letter-spacing:.14em;}
.now-speaker{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;color:var(--text);line-height:1.3;margin-bottom:4px;}
.now-talk{font-size:11px;color:var(--navy);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.next-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;}
.next-label{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.next-name{font-size:14px;font-weight:700;color:var(--text);}
.next-talk{font-size:11px;color:var(--text-dim);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.timer-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;}
.timer-label{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.timer-val{font-size:28px;font-weight:700;color:var(--navy);letter-spacing:.06em;font-variant-numeric:tabular-nums;font-family:'DM Serif Display',serif;}
.timer-val.warn{color:var(--warn);}

.ctrl-btns{display:flex;flex-direction:column;gap:8px;}
.btn{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s,background .15s;letter-spacing:.04em;}
.btn-next{background:var(--navy);color:#fff;}
.btn-next:hover{opacity:.88;}
.btn-prev{background:transparent;color:var(--navy);border:1px solid var(--navy-border);}
.btn-prev:hover{background:var(--navy-soft);}

.ctrl-toggles{display:flex;flex-direction:column;gap:8px;}
.btn-sml{padding:7px 12px;font-size:11px;font-weight:700;border-radius:7px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text-dim);width:100%;letter-spacing:.04em;transition:background .15s;}
.btn-sml:hover{background:var(--bg2);}
.btn-ai-toggle.on{background:rgba(22,163,74,.08);border-color:var(--teal-border);color:var(--live);}
.btn-ai-toggle.off{background:rgba(220,38,38,.06);border-color:rgba(220,38,38,.3);color:var(--warn);}
.btn-countdown-toggle.on{background:var(--navy-soft);border-color:var(--navy-border);color:var(--navy);}
.btn-countdown-toggle.off{background:var(--bg);border-color:var(--border);color:var(--text-faint);}

/* ── INBOX ── */
.inbox-section{border-top:1px solid var(--border);padding-top:14px;}
.inbox-title{font-size:10px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.inbox-tabs{display:flex;gap:6px;margin-bottom:10px;}
.inbox-tab{flex:1;padding:6px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text-faint);font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:background .15s;}
.inbox-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.inbox-list{display:flex;flex-direction:column;gap:6px;}
.inbox-empty{font-size:11px;color:var(--text-faint);text-align:center;padding:16px;}

/* Chat threads */
.chat-thread{background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.chat-thread.has-new{border-color:var(--teal-border);}
.chat-thread-header{padding:10px 12px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px;border-bottom:1px solid transparent;}
.chat-thread-header:hover{background:var(--bg2);}
.chat-thread-meta{flex:1;min-width:0;}
.chat-thread-label{font-size:11px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.chat-thread-num{font-size:10px;font-weight:700;color:var(--navy);}
.chat-thread-preview{font-size:10px;color:var(--text-faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-thread-badges{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.unread-badge{background:var(--warn);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;}
.chevron{font-size:10px;color:var(--text-faint);transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.chat-thread-msgs{padding:10px 12px;display:none;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;border-top:1px solid var(--border);}
.chat-thread-msgs.open{display:flex;}
.thread-msg{font-size:11px;line-height:1.5;padding:7px 10px;border-radius:8px;}
.thread-msg.p{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.thread-msg.p::before{content:"Participant: ";color:var(--text-faint);font-size:9px;font-weight:700;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;}
.thread-msg.o{background:var(--navy-soft);color:var(--navy);border:1px solid var(--navy-border);}
.thread-msg.o::before{content:"You";color:var(--navy);font-size:9px;font-weight:700;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;}
.thread-msg.a{background:rgba(22,163,74,.07);color:#14532d;border:1px solid rgba(22,163,74,.25);}
.thread-msg.a::before{content:"AI";color:var(--live);font-size:9px;font-weight:700;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;}
.reply-row{display:flex;gap:6px;margin-top:6px;}
.reply-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:11px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;}
.reply-inp::placeholder{color:var(--text-faint);}
.reply-inp:focus{border-color:var(--navy-border);}
.reply-btn{background:var(--navy);border:none;border-radius:7px;padding:7px 12px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;}

/* Feedback */
.fb-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;}
.fb-item-num{font-size:8px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.fb-item-text{font-size:11px;color:var(--text);line-height:1.6;}
.fb-item-time{font-size:9px;color:var(--text-faint);margin-top:5px;}
.fb-download-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:12px;padding:9px 14px;background:var(--navy);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:opacity .15s;font-family:'DM Sans',sans-serif;}
.fb-download-btn:hover{opacity:.88;}
</style>

let activeTab = 'chat';
let aiEnabled = true;
let showCountdown = false;

window.addEventListener('load', async () => {
  try {
    sb = supabase.createClient(SB_URL, SB_KEY);
    const { data, error } = await sb.from('live_state').select('current_id').eq('id', 1).single();
    if (error) throw error;
    currentId = data.current_id;

    const { data: existingMsgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
    if (existingMsgs) {
      existingMsgs.forEach(m => {
        const sid = m.session_id;
        if (!threads[sid]) { threadCounter++; threads[sid] = { num: threadCounter, msgs: [] }; threadOrder.push(sid); }
        const sType = m.sender === 'participant' ? 'p' : m.sender === 'ai' ? 'a' : 'o';
        threads[sid].msgs.push({ sender: sType, text: m.text, id: m.id, read: true });
      });
    }

    const { data: existingFb } = await sb.from('feedback').select('*').order('created_at', { ascending: false });
    if (existingFb) feedbacks = existingFb;

    startApp();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    console.error(e);
  }
});

function startApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  channel = sb.channel('live_state_changes')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'live_state' }, payload => {
      currentId = payload.new.current_id;
      render();
      if (payload.new.ai_enabled !== undefined && payload.new.ai_enabled !== aiEnabled) {
        aiEnabled = payload.new.ai_enabled;
        updateAIBtn();
      }
      if (payload.new.show_countdown !== undefined) {
        showCountdown = Boolean(payload.new.show_countdown);
        updateCountdownBtn();
      }
    })
    .subscribe(status => {
      const dot = document.getElementById('status-dot');
      const lbl = document.getElementById('status-label');
      if (status === 'SUBSCRIBED') { dot.classList.remove('off'); lbl.textContent = 'Live'; }
      else { dot.classList.add('off'); lbl.textContent = 'Connecting...'; }
    });

  sb.channel('incoming_messages')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload => {
      const sid = payload.new.session_id;
      const rawSender = payload.new.sender;
      const sType = rawSender === 'participant' ? 'p' : rawSender === 'ai' ? 'a' : 'o';
      const isNew = !threads[sid];
      if (isNew) { threadCounter++; threads[sid] = { num: threadCounter, msgs: [] }; threadOrder.push(sid); }
      if (sType === 'o') {
        const already = threads[sid].msgs.some(m => m.sender === 'o' && m.text === payload.new.text && !m.id);
        if (already) { const m = threads[sid].msgs.find(m => m.sender === 'o' && m.text === payload.new.text && !m.id); if (m) m.id = payload.new.id; return; }
      }
      const isUnread = sType === 'p';
      const msgObj = { sender: sType, text: payload.new.text, id: payload.new.id, read: !isUnread };
      threads[sid].msgs.push(msgObj);
      const msgsEl = document.getElementById('msgs-' + sid);
      const isOpen = msgsEl && msgsEl.classList.contains('open');
      if (isNew) { renderChatList(); return; }
      if (isOpen) {
        if (isUnread) msgObj.read = true;
        const replyRow = msgsEl.querySelector('.reply-row');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'thread-msg ' + sType;
        msgDiv.textContent = payload.new.text;
        msgsEl.insertBefore(msgDiv, replyRow);
        msgsEl.scrollTop = msgsEl.scrollHeight;
      } else if (sType === 'p') {
        const threadEl = document.getElementById('thread-' + sid);
        if (threadEl) {
          threadEl.classList.add('has-new');
          let badge = threadEl.querySelector('.unread-badge');
          const unreadCount = threads[sid].msgs.filter(m => m.sender === 'p' && !m.read).length;
          if (!badge) { badge = document.createElement('span'); badge.className = 'unread-badge'; threadEl.querySelector('.chat-thread-badges').prepend(badge); }
          badge.textContent = unreadCount + ' new';
        }
      }
      const preview = document.querySelector('#thread-' + sid + ' .chat-thread-preview');
      const t = payload.new.text;
      if (preview) preview.textContent = t.length > 35 ? t.substr(0, 35) + '…' : t;
      if (isUnread) { newMsgCount++; updateNotifBadge(); }
    })
    .subscribe();

  sb.channel('incoming_feedback')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'feedback' }, payload => {
      feedbacks.unshift(payload.new);
      renderFbList();
    })
    .subscribe();

  render();
  renderChatList();
  renderFbList();
  startTimer();
  loadAIState();
  loadCountdownState();
}

function updateNotifBadge() {
  const btn = document.getElementById('notif-btn');
  const cnt = document.getElementById('notif-count');
  let unread = 0;
  Object.values(threads).forEach(t => { t.msgs.forEach(m => { if (m.sender === 'p' && !m.read) unread++; }); });
  newMsgCount = unread;
  if (unread > 0) { btn.style.display = 'flex'; cnt.textContent = unread; }
  else { btn.style.display = 'none'; }
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
  document.getElementById('tab-fb').classList.toggle('active', tab === 'fb');
  document.getElementById('chat-list').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('fb-list').style.display = tab === 'fb' ? 'flex' : 'none';
  const dlBtn = document.getElementById('fb-download-btn');
  if (dlBtn) dlBtn.style.display = (tab === 'fb' && feedbacks.length) ? 'flex' : 'none';
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  if (!threadOrder.length) { list.innerHTML = '<div class="inbox-empty">No questions yet</div>'; return; }
  const openSet = new Set();
  threadOrder.forEach(sid => { const el = document.getElementById('msgs-' + sid); if (el && el.classList.contains('open')) openSet.add(sid); });
  list.innerHTML = '';
  const sorted = [...threadOrder].sort((a, b) => threads[a].num - threads[b].num);
  sorted.forEach(sid => {
    const t = threads[sid];
    const msgs = t.msgs;
    const lastMsg = msgs[msgs.length - 1];
    const unreadCount = msgs.filter(m => m.sender === 'p' && !m.read).length;
    const preview = lastMsg ? (lastMsg.text.length > 35 ? lastMsg.text.substr(0,35)+'…' : lastMsg.text) : '';
    const isOpen = openSet.has(sid);
    const div = document.createElement('div');
    div.className = 'chat-thread' + (unreadCount > 0 ? ' has-new' : '');
    div.id = 'thread-' + sid;
    div.innerHTML = `
      <div class="chat-thread-header" onclick="toggleThread('${sid}')">
        <div class="chat-thread-meta">
          <div class="chat-thread-label"><span class="chat-thread-num">Chat ${t.num}</span></div>
          <div class="chat-thread-preview">${preview}</div>
        </div>
        <div class="chat-thread-badges">
          ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount} new</span>` : ''}
          <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
        </div>
      </div>
      <div class="chat-thread-msgs ${isOpen ? 'open' : ''}" id="msgs-${sid}">
        ${msgs.map(m => `<div class="thread-msg ${m.sender}">${m.text}</div>`).join('')}
        <div class="reply-row">
          <input class="reply-inp" id="reply-${sid}" placeholder="Reply to Chat ${t.num}..." onkeydown="if(event.key==='Enter')sendReply('${sid}')">
          <button class="reply-btn" onclick="sendReply('${sid}')">↑</button>
        </div>
      </div>`;
    list.appendChild(div);
    if (isOpen) { threads[sid].msgs.forEach(m => m.read = true); setTimeout(() => { const e = document.getElementById('msgs-'+sid); if(e) e.scrollTop=e.scrollHeight; }, 50); }
  });
  updateNotifBadge();
}

function toggleThread(sid) {
  const msgsEl = document.getElementById('msgs-' + sid);
  if (!msgsEl) return;
  const chevron = document.querySelector('#thread-' + sid + ' .chevron');
  const isOpen = msgsEl.classList.contains('open');
  if (isOpen) {
    msgsEl.classList.remove('open');
    if (chevron) chevron.classList.remove('open');
  } else {
    const replyRow = msgsEl.querySelector('.reply-row');
    Array.from(msgsEl.querySelectorAll('.thread-msg')).forEach(el => el.remove());
    threads[sid].msgs.forEach(m => {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'thread-msg ' + m.sender;
      msgDiv.textContent = m.text;
      msgsEl.insertBefore(msgDiv, replyRow);
    });
    msgsEl.classList.add('open');
    if (chevron) chevron.classList.add('open');
    threads[sid].msgs.forEach(m => m.read = true);
    updateNotifBadge();
    const threadEl = document.getElementById('thread-' + sid);
    if (threadEl) { threadEl.classList.remove('has-new'); const badge = threadEl.querySelector('.unread-badge'); if (badge) badge.remove(); }
    setTimeout(() => { msgsEl.scrollTop = msgsEl.scrollHeight; }, 30);
  }
}

async function sendReply(sid) {
  const inp = document.getElementById('reply-' + sid);
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const msgObj = { sender:'o', text, read: true };
  threads[sid].msgs.push(msgObj);
  if (aiEnabled) {
    aiEnabled = false;
    updateAIBtn();
    try {
      const { error } = await sb.from('live_state').update({ ai_enabled: false }).eq('id', 1);
      if (error) await sb.from('live_state').upsert({ id: 1, ai_enabled: false });
    } catch(e) { console.error('AI auto-off failed:', e); }
  }
  await sb.from('messages').insert({ session_id: sid, sender: 'organizer', text });
  const msgsEl = document.getElementById('msgs-' + sid);
  if (msgsEl) {
    const replyRow = msgsEl.querySelector('.reply-row');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'thread-msg o';
    msgDiv.textContent = text;
    msgsEl.insertBefore(msgDiv, replyRow);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  const threadEl = document.getElementById('thread-' + sid);
  if (threadEl) { const preview = threadEl.querySelector('.chat-thread-preview'); if (preview) preview.textContent = text.length > 35 ? text.substr(0,35)+'…' : text; }
}

function renderFbList() {
  const list = document.getElementById('fb-list');
  const dlBtn = document.getElementById('fb-download-btn');
  if (!feedbacks.length) { list.innerHTML = '<div class="inbox-empty">No feedback yet</div>'; if(dlBtn) dlBtn.style.display='none'; return; }
  list.innerHTML = '';
  feedbacks.forEach((fb, i) => {
    const div = document.createElement('div');
    div.className = 'fb-item';
    const num = feedbacks.length - i;
    const t = fb.created_at ? new Date(fb.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '';
    div.innerHTML = `<div class="fb-item-num">Feedback #${num}</div><div class="fb-item-text">${fb.text}</div>${t ? `<div class="fb-item-time">${t}</div>` : ''}`;
    list.appendChild(div);
  });
  if(dlBtn) dlBtn.style.display='flex';
}

  { key:'day1_open',   label:'Opening Ceremony' },
  { key:'day1_keynote',label:'Keynote Address' },
  { key:'day1_s1',     label:'Oral Presentations — Session I' },
  { key:'day1_break1', label:'' },
  { key:'day1_poster', label:'Poster Pitches (5 min each)' },
  { key:'day1_s2',     label:'Oral Presentations — Session II' },
  { key:'day1_lunch',  label:'' },
  { key:'day1_s2b',    label:'' },
  { key:'day1_close',  label:'' },
  { key:'day2_open',   label:'Day 2 — Sunday, 14 June 2026' },
  { key:'day2_s3',     label:'Oral Presentations — Session III' },
  { key:'day2_break',  label:'' },
  { key:'day2_panel',  label:'Panel Discussion & Workshops' },
  { key:'day2_ws',     label:'' },
  { key:'day2_close',  label:'' },

function getNextPresenter(fromId) {
  const ci = AGENDA.findIndex(a => a.id === fromId);
  for (let i = ci + 1; i < AGENDA.length; i++) if (!AGENDA[i].isBreak) return AGENDA[i];
  return null;
}
function getPrevPresenter(fromId) {
  const ci = AGENDA.findIndex(a => a.id === fromId);
  for (let i = ci - 1; i >= 0; i--) if (!AGENDA[i].isBreak) return AGENDA[i];
  return null;
}

function render() {
  const cur = AGENDA.find(a => a.id === currentId);
  const nxt = getNextPresenter(currentId);
  document.getElementById('side-now-name').textContent = cur ? cur.speaker : '—';
  document.getElementById('side-now-talk').textContent = cur ? (cur.title.split('\n')[0] || '') : '';
  document.getElementById('side-next-name').textContent = nxt ? nxt.speaker : 'Program Concluded';
  document.getElementById('side-next-talk').textContent = nxt ? (nxt.title.split('\n')[0] || '') : '';

  let html = '';
  SECS.forEach(sec => {
    const items = AGENDA.filter(a => a.session === sec.key);
    if (!items.length) return;
    if (sec.label) html += `<div class="section-title">${sec.label}</div>`;
    items.forEach(item => {
      const isCur = item.id === currentId;
      const isNxt = nxt && item.id === nxt.id;
      const subs = item.title ? item.title.split('\n') : [];
      html += `<div class="item ${isCur?'live':''} ${item.isBreak?'break':''}" onclick="${!item.isBreak?'setLive('+item.id+')':''}">
        <div class="t-col">${item.time||''}</div>
        <div class="divline"></div>
        <div class="i-col">
          <div class="i-name">
            <span>${item.speaker}</span>
            ${isCur?`<span class="badge badge-live">Speaking</span><span class="badge badge-timer" id="agenda-timer">00:00</span>`:''}
            ${isNxt?`<span class="badge badge-next">Up next</span>`:''}
          </div>
          ${subs[0]?`<div class="i-sub">${subs[0]}</div>`:''}
          ${subs[1]?`<div class="i-sub2">${subs[1]}</div>`:''}
        </div>
      </div>`;
    });
  });
  document.getElementById('agenda-panel').innerHTML = html;
  setTimeout(() => { const live = document.querySelector('.item.live'); if (live) live.scrollIntoView({ behavior:'smooth', block:'center' }); }, 100);
}

function startTimer() {
  timerStart = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    const val = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    const el = document.getElementById('timer-val');
    if (el) { el.textContent = val; el.className = 'timer-val' + (elapsed >= 900 ? ' warn' : ''); }
    const ae = document.getElementById('agenda-timer');
    if (ae) { ae.textContent = val; }
  }, 1000);
}

function updateAIBtn() {
  const btn = document.getElementById('ai-toggle-btn');
  if (!btn) return;
  btn.textContent = aiEnabled ? '🤖 AI: ON' : '🤖 AI: OFF';
  btn.className = 'btn-sml btn-ai-toggle ' + (aiEnabled ? 'on' : 'off');
}

function updateCountdownBtn() {
  const btn = document.getElementById('countdown-toggle-btn');
  if (!btn) return;
  btn.textContent = showCountdown ? '⏳ Countdown: ON' : '⏳ Countdown: OFF';
  btn.className = 'btn-sml btn-countdown-toggle ' + (showCountdown ? 'on' : 'off');
}

async function toggleAI() {
  aiEnabled = !aiEnabled;
  updateAIBtn();
  try {
    const { error } = await sb.from('live_state').update({ ai_enabled: aiEnabled }).eq('id', 1);
    if (error) await sb.from('live_state').upsert({ id: 1, ai_enabled: aiEnabled });
  } catch(e) { console.error('AI toggle failed:', e); }
}

async function loadAIState() {
  try {
    const { data } = await sb.from('live_state').select('ai_enabled').eq('id', 1).single();
    if (data && data.ai_enabled !== null && data.ai_enabled !== undefined) { aiEnabled = data.ai_enabled; updateAIBtn(); }
  } catch(e) {}
}

async function toggleCountdown() {
  showCountdown = !showCountdown;
  updateCountdownBtn();
  try {
    const { error } = await sb.from('live_state').update({ show_countdown: showCountdown }).eq('id', 1);
    if (error) await sb.from('live_state').upsert({ id: 1, show_countdown: showCountdown });
  } catch(e) { console.error('Countdown toggle failed:', e); }
}

async function loadCountdownState() {
  try {
    const { data } = await sb.from('live_state').select('show_countdown').eq('id', 1).single();
    if (data && data.show_countdown !== null && data.show_countdown !== undefined) { showCountdown = Boolean(data.show_countdown); updateCountdownBtn(); }
  } catch(e) {}
}

async function setLive(id) {
  currentId = id;
  render();
  startTimer();
  await sb.from('live_state').update({ current_id: id, speaker_started_at: new Date().toISOString() }).eq('id', 1);
}
function moveNext() { const nxt = getNextPresenter(currentId); if (nxt) setLive(nxt.id); }
function movePrev() { const prv = getPrevPresenter(currentId); if (prv) setLive(prv.id); }
